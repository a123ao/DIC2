<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>RL Gridworld - HW1</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <link rel="stylesheet" href="/static/style.css">
    <link rel="stylesheet" href="https://cdnjs.cloudflare.com/ajax/libs/font-awesome/6.4.0/css/all.min.css">
</head>
<body>
    <div class="app-container">
        <header>
            <h1><i class="fa-solid fa-cube"></i> RL Gridworld</h1>
            <p>HW1: Grid Map, Policy Evaluation & Value Iteration</p>
        </header>

        <main class="content">
            <aside class="controls-panel">
                <div class="control-group">
                    <label for="grid-size">Grid Size (n): <span id="n-value">5</span>x<span id="n-value-2">5</span></label>
                    <input type="range" id="grid-size" min="5" max="9" value="5">
                </div>
                
                <div class="control-group info">
                    Expected Obstacles: <span id="obstacles-expected" class="badge">3</span><br>
                    Placed: <span id="obstacles-placed" class="badge">0</span>
                </div>

                <div class="control-group">
                    <h3>Draw Mode</h3>
                    <div class="mode-selector">
                        <label class="mode-btn mode-start active">
                            <input type="radio" name="drawMode" value="start" checked>
                            <i class="fa-solid fa-play"></i> Start Point
                        </label>
                        <label class="mode-btn mode-end">
                            <input type="radio" name="drawMode" value="end">
                            <i class="fa-solid fa-flag-checkered"></i> End Point
                        </label>
                        <label class="mode-btn mode-obstacle">
                            <input type="radio" name="drawMode" value="obstacle">
                            <i class="fa-solid fa-ban"></i> Obstacles
                        </label>
                    </div>
                </div>

                <div class="actions">
                    <button id="btn-reset" class="btn btn-secondary"><i class="fa-solid fa-rotate-left"></i> Reset Grid</button>
                    <button id="btn-evaluate" class="btn btn-primary"><i class="fa-solid fa-dice"></i> 1. Random Policy Evaluation</button>
                    <button id="btn-optimize" class="btn btn-success"><i class="fa-solid fa-wand-magic-sparkles"></i> 2. Value Iteration (Optimal)</button>
                </div>
                
                <div id="status-message" class="status-message">
                    Please set start and end points to begin.
                </div>
            </aside>

            <section class="grid-container-wrapper">
                <div id="grid" class="grid-board">
                    <!-- Grid will be generated by JS -->
                </div>
                <div class="legend">
                    <div class="legend-item"><span class="color-box start"></span> Start</div>
                    <div class="legend-item"><span class="color-box end"></span> End</div>
                    <div class="legend-item"><span class="color-box obstacle"></span> Obstacle</div>
                </div>
            </section>
        </main>
    </div>
    
    <script src="/static/script.js"></script>
</body>
</html>
